<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Wishing Terminal 🚀</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 90%; max-width: 500px; background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; text-align: center; }
        h1 { color: #58a6ff; font-size: 1.4rem; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: #0d1117; border: 1px solid #30363d; color: #32ff7e; border-radius: 5px; box-sizing: border-box; }
        .btn-main { width: 100%; background: #238636; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .card { background: white; color: #333; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        #displayImg { max-width: 100%; border-radius: 8px; }
        #animation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .floating-item { position: absolute; font-size: 2rem; animation: floatUp 5s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>
    <div id="animation-overlay"></div>
    <div class="container">
        <h1>🚩 उत्सव विशिंग कार्ड 🚩</h1>
        <input type="text" id="userName" placeholder="आपका नाम">
        <input type="text" id="festName" placeholder="त्योहार का नाम (Holi, Diwali)" onkeyup="autoTheme()">
        <textarea id="wishMessage" placeholder="बधाई संदेश लिखें"></textarea>
        <input type="text" id="imgUrl" placeholder="फोटो लिंक (Optional)">
        <button class="btn-main" onclick="generateWish()">लिंक बनाएँ ⚡</button>

        <div id="shareSection" style="display:none; margin-top:20px; padding: 10px; background: #21262d;">
            <p>आपका लिंक तैयार है:</p>
            <input type="text" id="shareURL" readonly>
            <button onclick="copyToClipboard()" style="background:#58a6ff; color:white; border:none; padding:5px 10px; border-radius:4px; margin-top:5px;">कॉपी करें</button>
        </div>

        <div id="wishCard" class="card">
            <h2 id="displayFest"></h2>
            <img id="displayImg" src="">
            <p id="displayMsg"></p>
            <h3 id="displayName"></h3>
            <button onclick="shareWhatsApp()" style="background:#25D366; color:white; border:none; padding:10px; width:100%; border-radius:5px; font-weight:bold;">WhatsApp पर भेजें</button>
        </div>
    </div>

    <script>
        // --- Firebase Setup ---
        const firebaseConfig = {
            apiKey: "AIzaSyARBeG1o0EpjEZBn_jhiSmGCb1BTjOLLIU",
            authDomain: "mywishingapp.firebaseapp.com",
            databaseURL: "https://mywishingapp-default-rtdb.firebaseio.com",
            projectId: "mywishingapp",
            storageBucket: "mywishingapp.appspot.com",
            messagingSenderId: "1027937571326",
            appId: "1:1027937571326:web:02e5416ef002c10eb570af"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function autoTheme() {
            const fest = document.getElementById('festName').value.toLowerCase();
            if(fest === "holi") { document.body.style.backgroundColor = "#FF4081"; startFloating("🌈"); }
            if(fest === "diwali") { document.body.style.backgroundColor = "#FF8C00"; startFloating("🪔"); }
        }

        function generateWish() {
            const data = {
                name: document.getElementById('userName').value || "शुभचिंतक",
                fest: document.getElementById('festName').value || "उत्सव",
                msg: document.getElementById('wishMessage').value || "हार्दिक शुभकामनाएं!",
                img: document.getElementById('imgUrl').value || "https://via.placeholder.com/300?text=Happy+Festival"
            };

            const newRef = database.ref('wishes').push();
            newRef.set(data).then(() => {
                const link = window.location.origin + window.location.pathname + "?id=" + newRef.key;
                document.getElementById('shareURL').value = link;
                document.getElementById('shareSection').style.display = "block";
                renderCard(data);
                confetti({ particleCount: 150, spread: 70 });
            });
        }

        function renderCard(data) {
            document.getElementById('displayFest').innerText = "शुभ " + data.fest;
            document.getElementById('displayMsg').innerText = data.msg;
            document.getElementById('displayName').innerText = "प्रेषक: " + data.name;
            document.getElementById('displayImg').src = data.img;
            document.getElementById('wishCard').style.display = "block";
        }

        function copyToClipboard() {
            const copyText = document.getElementById("shareURL");
            copyText.select();
            document.execCommand("copy");
            alert("लिंक कॉपी हो गया!");
        }

        function shareWhatsApp() {
            const link = document.getElementById("shareURL").value;
            window.open(`https://wa.me/?text=देखिए मैंने आपके लिए क्या भेजा है! 🚩: ${link}`, '_blank');
        }

        function startFloating(emoji) {
            const overlay = document.getElementById('animation-overlay');
            overlay.innerHTML = '';
            for(let i=0; i<10; i++) {
                let s = document.createElement('span'); s.innerText = emoji; s.className = 'floating-item';
                s.style.left = Math.random() * 100 + "vw"; s.style.animationDelay = Math.random() * 5 + "s";
                overlay.appendChild(s);
            }
        }

        window.onload = function() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) {
                database.ref('wishes/' + id).once('value').then((snap) => {
                    if (snap.exists()) renderCard(snap.val());
                });
            }
        };
    </script>
</body>
</html>
